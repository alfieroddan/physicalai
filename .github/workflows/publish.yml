name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create releases and tags
      pull-requests: write # Needed to create release PRs
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
    steps:
      - name: Run release-please
        id: release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          target-branch: main

  build:
    runs-on: ubuntu-latest
    needs: release-please
    if: |
      always() && (
        (needs.release-please.result == 'success' && needs.release-please.outputs.release_created == 'true') ||
        needs.release-please.result == 'skipped'
      )
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0 # needed for hatch-vcs to resolve version from git tags

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Build distributions
        run: python -m pip install build==1.5.0 twine==6.2.0 && python -m build && python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/

  smoke-test:
    runs-on: ubuntu-latest
    needs: [release-please, build]
    if: |
      always() && needs.build.result == 'success' && (
        (needs.release-please.result == 'success' && needs.release-please.outputs.release_created == 'true') ||
        needs.release-please.result == 'skipped'
      )
    permissions:
      contents: read
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Verify clean wheel install
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -m pip check
          python - <<'PY'
          import importlib.metadata as metadata

          import physicalai.capture
          import physicalai.inference
          import physicalai.robot
          import physicalai.runtime

          print(metadata.version("physicalai"))
          PY

  publish:
    runs-on: ubuntu-latest
    needs: [release-please, smoke-test]
    if: |
      always() && needs.smoke-test.result == 'success' &&
      needs.release-please.result == 'success' &&
      needs.release-please.outputs.release_created == 'true'
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/physicalai
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
