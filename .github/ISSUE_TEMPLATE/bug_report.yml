name: Bug report
description: Report a reproducible defect in Physical AI.
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Please include enough detail for a maintainer to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect to happen instead?
      placeholder: A short description of the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, deterministic reproduction.
      placeholder: |
        1. Install ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and traceback
      description: Paste the relevant console output, stack trace, or screenshots.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: List the relevant environment details.
      placeholder: |
        - OS:
        - Python:
        - physicalai version or commit:
        - Hardware / camera / robot setup:
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add anything else that may help diagnose the issue.
